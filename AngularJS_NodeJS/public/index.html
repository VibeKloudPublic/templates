<!doctype html>
<html ng-app="productsApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AngularJS + Node.js Fullstack</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  </head>
  <body ng-controller="ProductsController as vm" style="font-family: Arial; max-width: 720px; margin: 2rem auto;">
    <h1>Products</h1>
    <form ng-submit="vm.createProduct()">
      <input ng-model="vm.form.name" placeholder="Name" required />
      <input ng-model="vm.form.price" type="number" min="0" placeholder="Price" required />
      <button type="submit">Create</button>
    </form>

    <ul>
      <li ng-repeat="product in vm.products">
        {{product.name}} - ${{product.price}}
      </li>
    </ul>

    <script>
      angular.module('productsApp', []).controller('ProductsController', function ($http) {
        const vm = this;
        vm.form = {};
        vm.products = [];

        vm.loadProducts = function () {
          $http.get('/api/products').then((res) => {
            vm.products = res.data;
          });
        };

        vm.createProduct = function () {
          $http.post('/api/products', vm.form).then(() => {
            vm.form = {};
            vm.loadProducts();
          });
        };

        vm.loadProducts();
      });
    </script>
  </body>
</html>
