<!doctype html>
<html>
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width" /><title>Django Fullstack</title></head>
  <body style="max-width: 720px; margin: 2rem auto; font-family: Arial">
    <h1>Django + Firestore Products</h1>
    <form id="form">
      <input id="name" required placeholder="Name" />
      <input id="price" type="number" required placeholder="Price" />
      <button>Create</button>
    </form>
    <ul id="list"></ul>
    <script>
      async function load() {
        const products = await (await fetch('/api/products')).json();
        document.getElementById('list').innerHTML = products.map((p) => `<li>${p.name} - $${p.price}</li>`).join('');
      }
      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await fetch('/api/products/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            price: Number(document.getElementById('price').value)
          })
        });
        e.target.reset();
        load();
      });
      load();
    </script>
  </body>
</html>
